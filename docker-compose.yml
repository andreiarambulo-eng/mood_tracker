version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mood_tracker_api
    restart: unless-stopped
    environment:
      APP_NAME: Mood Tracker API
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ENVIRONMENT: production
      DATABASE_PATH: /app/data/mood_tracker.db
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-in-production}
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mood_tracker_ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
