version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mood_tracker_api_dev
    restart: unless-stopped
    environment:
      APP_NAME: Mood Tracker API (Dev)
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ENVIRONMENT: development
      CONNECTION_STRING: mongodb://mongo:27017/
      DATABASE_NAME: mood_tracker_dev
      JWT_SECRET: dev_secret_change_in_prod
      ENCRYPTION_KEY: dev_encryption_key_change_in_prod
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      - mongo
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mood_tracker_ui_dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  mongo:
    image: mongo:7
    container_name: mood_tracker_mongo_dev
    restart: unless-stopped
    volumes:
      - mongo_dev_data:/data/db
      - ./backend/init_mongodb.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"

volumes:
  mongo_dev_data:
